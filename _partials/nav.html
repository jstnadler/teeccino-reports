<!--
  Shared top-nav partial for teeccino-reports dashboards.
  Owner: HubSmith. Modify only via clawd-hubsmith.

  How to include in a dashboard (no build step required):
      <div id="hub-nav"></div>
      <script>
        fetch('/teeccino-reports/_partials/nav.html')
          .then(r => r.text())
          .then(html => {
            var slot = document.getElementById('hub-nav');
            slot.innerHTML = html;
            document.body.classList.add('has-hub-nav');
            // Re-execute any <script> tags from the fragment (innerHTML does NOT run them).
            slot.querySelectorAll('script').forEach(function (s) {
              var n = document.createElement('script');
              if (s.src) { n.src = s.src; } else { n.textContent = s.textContent; }
              document.head.appendChild(n);
            });
          });
      </script>

  Aesthetics: gold #D4A843 on dark #1a1a2e, matches index.html. Uses inline <style scoped> equivalent
  (a <style> block is allowed inside fragment HTML when innerHTML'd into a div).
-->
<style>
  /* Scoped via #hub-nav-bar to avoid clashing with host page styles */
  #hub-nav-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(26, 26, 46, 0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  #hub-nav-bar .brand {
    font-weight: 700; font-size: 1.05em; color: #D4A843;
    text-decoration: none; letter-spacing: -0.02em;
  }
  #hub-nav-bar .brand:hover { color: #F5D784; }
  #hub-nav-bar .group {
    display: flex; align-items: center; gap: 14px;
    margin-left: 16px;
  }
  #hub-nav-bar .group-label {
    color: #64748b; font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 600;
  }
  #hub-nav-bar a.nav-link {
    color: #94a3b8; text-decoration: none; font-size: 0.88em;
    padding: 4px 10px; border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  #hub-nav-bar a.nav-link:hover {
    color: #D4A843; background: rgba(212, 168, 67, 0.08);
  }
  #hub-nav-bar a.nav-link.active {
    color: #D4A843; background: rgba(212, 168, 67, 0.12);
    font-weight: 600;
  }
  #hub-nav-bar .spacer { flex: 1; }
  #hub-nav-bar .home-link {
    color: #D4A843; font-size: 0.85em; text-decoration: none;
    border: 1px solid rgba(212, 168, 67, 0.3); padding: 4px 12px; border-radius: 6px;
    transition: background 0.15s;
  }
  #hub-nav-bar .home-link:hover { background: rgba(212, 168, 67, 0.1); }
  /* Allow the nav itself to wrap onto multiple rows on intermediate desktop widths.
     Original CSS only enabled flex-wrap at <=880px, so 1100-1699px viewports clipped content
     (or overflowed) instead of wrapping cleanly. With wrap enabled here, the JS sync below
     measures the actual rendered height and updates body padding to match. */
  #hub-nav-bar { flex-wrap: wrap; row-gap: 6px; }
  /* CSS fallback padding — applies before the JS sync runs (sub-100ms flash) and if JS is disabled.
     Covers the worst observed wrap (91px @ 1100-1499) plus the new flex-wrap behavior which can
     produce 2-3 row nav at narrower widths. The JS sync tightens this on wide viewports (down to
     ~61px when nav is single-line) and loosens it if the nav wraps deeper than expected. */
  body.has-hub-nav { padding-top: 140px !important; }
  @media (min-width: 1500px) {
    body.has-hub-nav { padding-top: 80px !important; }
  }
  @media (min-width: 1700px) {
    body.has-hub-nav { padding-top: 60px !important; }
  }
  @media (max-width: 880px) {
    #hub-nav-bar { gap: 8px; padding: 10px 12px; }
    #hub-nav-bar .group { margin-left: 0; gap: 8px; }
    #hub-nav-bar .group-label { display: none; }
    #hub-nav-bar a.nav-link { font-size: 0.8em; padding: 3px 8px; }
  }
</style>

<!--
  BOOTSTRAP TRICK: dashboards fetch this fragment and assign it via innerHTML, which per HTML spec
  does NOT execute <script> tags inserted that way. To make our nav-sync + active-link logic run
  without requiring every dashboard's include block to be rewritten, we use an <img> with an
  invalid src so onerror fires synchronously after innerHTML parsing. HTML event attributes
  (onerror/onload) DO get honored on innerHTML-injected elements — this is the well-known
  workaround. The <img> stays display:none and contributes nothing to layout.
-->
<img src="data:," alt="" style="display:none"
     onerror="(function(){
       if (window.__hubNavBootstrapped) return;
       window.__hubNavBootstrapped = true;
       /* 1) Active-link highlight */
       var here = window.location.pathname.replace(/^.*\/teeccino-reports\//, '').replace(/^\//, '');
       if (!here) here = 'index.html';
       document.querySelectorAll('#hub-nav-bar a.nav-link').forEach(function (a) {
         var href = a.getAttribute('href').replace(/^.*\/teeccino-reports\//, '').replace(/^\//, '');
         if (href === here || (here.startsWith(href.replace('.html', '')) && href !== 'index.html')) {
           a.classList.add('active');
         }
       });
       /* 2) Dynamic body padding-top sync to actual nav height + 8px clearance.
          Adapts to any nav height (wraps, future nav additions, browser zoom) — replaces the
          brittle static 60px rule that clipped H1s on viewports below ~1700px. */
       var nav = document.getElementById('hub-nav-bar');
       if (!nav) return;
       var CLEARANCE = 8;
       function sync() {
         var h = nav.offsetHeight;
         /* setProperty with 'important' priority is required to override the !important
            CSS fallback above. Without it, the static media-query rules win and the JS
            sync has no effect (which was the original bug DataOps caught). */
         if (h > 0) document.body.style.setProperty('padding-top', (h + CLEARANCE) + 'px', 'important');
       }
       sync();
       var pending = false;
       window.addEventListener('resize', function () {
         if (pending) return;
         pending = true;
         requestAnimationFrame(function () { pending = false; sync(); });
       });
       if (document.fonts && document.fonts.ready) document.fonts.ready.then(sync);
       if (typeof ResizeObserver !== 'undefined') new ResizeObserver(sync).observe(nav);
     })()">
